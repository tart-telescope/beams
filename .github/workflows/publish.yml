#
# Publish to PyPI via trusted (OIDC) publishing.
#
# Setup — one-time, done in the PyPI project settings
# (https://pypi.org/manage/project/tart-beam/settings/):
#
#   Trusted publisher  ->  GitHub Actions
#   Owner              :  tart-telescope
#   Repository         :  beams
#   Workflow name      :  publish.yml
#   Environment name   :  pypi              (optional)
#
# After that, any push with a tag like v0.2.0 will be built and uploaded
# automatically.  Test with TestPyPI first by swapping the pypa/gh-action
# inputs to use https://test.pypi.org/legacy/ and setting up the trusted
# publisher on TestPyPI instead.

name: Publish to PyPI

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  id-token: write  # required for trusted (OIDC) publishing
  contents: read

jobs:
  test-and-publish:
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/tart-beam/

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build and test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install hatchling '.[dev]'

      - name: Run tests
        run: |
          pytest

      - name: Build source distribution and wheel
        run: |
          python -m hatchling build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        # For a dry run against TestPyPI, replace the step above with:
        # uses: pypa/gh-action-pypi-publish@release/v1
        # with:
        #   repository-url: https://test.pypi.org/legacy/
